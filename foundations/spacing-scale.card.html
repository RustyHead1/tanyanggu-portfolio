<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale" subtitle="4 → 128px; sections breathe at 48px (3em)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--tyg-bg); padding: 26px 30px; font-family: var(--tyg-font-sans); }
  .row { display: flex; align-items: center; gap: 16px; margin-bottom: 9px; }
  .bar { height: 14px; background: var(--tyg-accent); border-radius: 2px; opacity: .9; }
  .n { color: var(--tyg-fg); font-size: 12px; width: 70px; flex: none; }
  .h { color: var(--tyg-fg-faint); font-family: var(--tyg-font-mono); font-size: 10px; }
</style>
</head>
<body>
  <div class="row"><span class="n">space-1</span><div class="bar" style="width:4px"></div><span class="h">4px</span></div>
  <div class="row"><span class="n">space-2</span><div class="bar" style="width:8px"></div><span class="h">8px</span></div>
  <div class="row"><span class="n">space-3</span><div class="bar" style="width:12px"></div><span class="h">12px</span></div>
  <div class="row"><span class="n">space-4</span><div class="bar" style="width:16px"></div><span class="h">16px</span></div>
  <div class="row"><span class="n">space-5</span><div class="bar" style="width:24px"></div><span class="h">24px</span></div>
  <div class="row"><span class="n">space-6</span><div class="bar" style="width:32px"></div><span class="h">32px</span></div>
  <div class="row"><span class="n">space-7 ★</span><div class="bar" style="width:48px"></div><span class="h">48px · section</span></div>
  <div class="row"><span class="n">space-8</span><div class="bar" style="width:64px"></div><span class="h">64px</span></div>
  <div class="row"><span class="n">space-9</span><div class="bar" style="width:96px"></div><span class="h">96px</span></div>
</body>
</html>
