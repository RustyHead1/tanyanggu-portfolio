<!-- @dsCard group="Brand" viewport="700x260" name="Imagery temperature" subtitle="Dark, near-monochrome, cool — rare warm punctuation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--tyg-bg); padding: 24px; font-family: var(--tyg-font-sans); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .frame { position: relative; border-radius: var(--tyg-radius-md); overflow: hidden; aspect-ratio: 16 / 10; }
  .frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .frame .cap {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 12px 9px;
    background: linear-gradient(to top, rgba(10,10,11,.92), transparent);
    color: var(--tyg-fg); font-size: 12px; letter-spacing: .02em;
  }
  .legend { margin-top: 14px; color: var(--tyg-fg-dim); font-size: 12px; line-height: 1.6; }
  .legend b { color: var(--tyg-fg); font-weight: 500; }
</style>
</head>
<body>
  <div class="grid">
    <div class="frame"><img src="../assets/images/perf-wesa.jpg" alt=""><span class="cap">cool grey + red stab</span></div>
    <div class="frame"><img src="../assets/images/fulldome-body.jpg" alt=""><span class="cap">monochrome fulldome</span></div>
    <div class="frame"><img src="../assets/images/emergent-cosmos.jpg" alt=""><span class="cap">near-black render</span></div>
  </div>
  <div class="legend"><b>Desaturated, cinematic, low-key.</b> Projection blue-grey is home base; warmth (red / orange) enters only as a rare accent. Frames round at 6px; text over media gets a bottom-up black scrim.</div>
</body>
</html>
