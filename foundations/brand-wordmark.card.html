<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark" subtitle="No logo mark — Raleway text is the identity" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--tyg-bg); padding: 30px; font-family: var(--tyg-font-sans); }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .mark { font-size: 26px; color: var(--tyg-fg-title); font-weight: 400; }
  .mark .sep { color: var(--tyg-fg-faint); margin: 0 8px; font-weight: 300; }
  .pair { display: flex; align-items: baseline; gap: 16px; }
  .ja { font-size: 22px; color: var(--tyg-fg); letter-spacing: .04em; }
  .en { font-size: 14px; color: var(--tyg-fg-dim); text-transform: uppercase; letter-spacing: .18em; }
  .fav { display:flex; align-items:center; gap: 12px; color: var(--tyg-fg-faint); font-size: 11px; font-family: var(--tyg-font-mono); }
  .fav img { width: 26px; height: 26px; border-radius: 5px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="mark">Tan Yanggu <span class="sep">|</span> Portfolio</div>
    <div class="pair"><span class="ja">タン ヤング</span><span class="en">RustyHead</span></div>
    <div class="fav"><img src="../assets/favicon.png" alt="favicon">the only brand bitmap — assets/favicon.png</div>
  </div>
</body>
</html>
