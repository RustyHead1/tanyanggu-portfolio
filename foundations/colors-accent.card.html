<!-- @dsCard group="Colors" viewport="700x210" name="Accent — the single electric blue" subtitle="#007fff appears only on interaction: hover, focus" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--tyg-bg); padding: 24px; font-family: var(--tyg-font-sans); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; align-items: start; }
  .sw { }
  .chip { height: 60px; border-radius: var(--tyg-radius); }
  .lbl { padding: 8px 2px 0; font-size: 11px; }
  .lbl .n { color: var(--tyg-fg); display: block; letter-spacing: .04em; }
  .lbl .h { color: var(--tyg-fg-dim); font-family: var(--tyg-font-mono); font-size: 10px; }
  .demo { grid-column: 1 / -1; display: flex; gap: 26px; align-items: center; margin-top: 6px;
          border-top: 1px solid var(--tyg-line-soft); padding-top: 16px; }
  .demo a { color: var(--tyg-fg); font-size: 15px; }
  .demo a.hov { color: var(--tyg-accent); }
  .note { color: var(--tyg-fg-faint); font-size: 11px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:#007fff"></div><div class="lbl"><span class="n">accent ★</span><span class="h">#007fff</span></div></div>
    <div class="sw"><div class="chip" style="background:#046bd2"></div><div class="lbl"><span class="n">accent-deep</span><span class="h">#046bd2</span></div></div>
    <div class="sw"><div class="chip" style="background:#045cb4"></div><div class="lbl"><span class="n">accent-deeper</span><span class="h">#045cb4</span></div></div>
    <div class="demo">
      <a href="#">Resting link</a>
      <a href="#" class="hov">Hover / focus →</a>
      <span class="note">The accent is rationed — interaction only, never as a fill or background by default.</span>
    </div>
  </div>
</body>
</html>
